<!DOCTYPE html>
<html>
<head>
    <title>Edit Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-warning px-4">
    <span class="navbar-brand">✏ Edit Assignment</span>
    <a href="/assign_course" class="btn btn-light">Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow-sm p-4">
        <h4 class="mb-4 text-center">Update Faculty-Course Assignment</h4>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Select Faculty</label>
                <select name="faculty_id" class="form-select" required>
                    {% for f in faculty %}
                    <option value="{{ f.id }}"
                        {% if f.id == assignment.faculty_id %}selected{% endif %}>
                        {{ f.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Course</label>
                <select name="course_id" class="form-select" required>
                    {% for c in courses %}
                    <option value="{{ c.id }}"
                        {% if c.id == assignment.course_id %}selected{% endif %}>
                        {{ c.course_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/assign_course" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-warning">Update Assignment</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
