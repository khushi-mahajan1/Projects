<!DOCTYPE html>
<html>
<head>
    <title>Edit Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-warning px-4">
    <span class="navbar-brand">✏ Edit Schedule</span>
    <a href="/schedule" class="btn btn-light">Back</a>
</nav>

<div class="container mt-5">

    <div class="card p-4 shadow-sm">
        <h4 class="text-center mb-4">Update Schedule</h4>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Faculty</label>
                <select name="faculty_id" class="form-select" required>
                    {% for f in faculty %}
                    <option value="{{ f.id }}"
                        {% if f.id == schedule.faculty_id %}selected{% endif %}>
                        {{ f.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Course</label>
                <select name="course_id" class="form-select" required>
                    {% for c in courses %}
                    <option value="{{ c.id }}"
                        {% if c.id == schedule.course_id %}selected{% endif %}>
                        {{ c.course_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Exam Date</label>
                <input type="date" name="exam_date" 
                       value="{{ schedule.exam_date }}" 
                       class="form-control" required>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/schedule" class="btn btn-secondary">Cancel</a>
                <button class="btn btn-warning">Update</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
