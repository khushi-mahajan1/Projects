<!DOCTYPE html>
<html>
<head>
    <title>Assign Courses to Faculty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success px-4">
    <span class="navbar-brand">📚 Assign Courses</span>
    <a href="/dashboard" class="btn btn-light">Back</a>
</nav>

<div class="container mt-4">

    <!-- Form to assign course -->
    <div class="card p-3 shadow-sm mb-4">
        <h5>Assign Course to Faculty</h5>
        <form method="post">
            <div class="row">
                <div class="col-md-5">
                    <select name="faculty_id" class="form-select" required>
                        <option value="">Select Faculty</option>
                        {% for f in faculty %}
                        <option value="{{ f.id }}">{{ f.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-5">
                    <select name="course_id" class="form-select" required>
                        <option value="">Select Course</option>
                        {% for c in courses %}
                        <option value="{{ c.id }}">{{ c.course_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-success w-100">Assign</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Table of current assignments -->
    <div class="card p-3 shadow-sm">
        <h5>Current Assignments</h5>

        <table class="table table-bordered table-striped mt-2 text-center">
            <thead class="table-success">
                <tr>
                    <th>ID</th>
                    <th>Faculty Name</th>
                    <th>Course Name</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% if assignments %}
                    {% for a in assignments %}
                    <tr>
                        <td>{{ a.id }}</td>
                        <td>{{ a.faculty_name }}</td>
                        <td>{{ a.course_name }}</td>
                        <td>
                            <a href="/edit_assignment/{{ a.id }}" 
                               class="btn btn-sm btn-warning">Edit</a>

                            <a href="/delete_assignment/{{ a.id }}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this assignment?')">
                               Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="4" class="text-muted">No assignments found</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
