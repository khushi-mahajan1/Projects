<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function validateLogin(event) {
            event.preventDefault(); // stop normal form submission

            const FIXED_USERNAME = "salesiancollege";
            const FIXED_PASSWORD = "salesian@2023";

            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();
            let error = document.getElementById("error");

            // Clear previous error
            error.innerText = "";

            if (username === "" || password === "") {
                error.innerText = "Username and Password cannot be empty!";
                return false;
            }

            if (username === FIXED_USERNAME && password === FIXED_PASSWORD) {
                window.location.href = "/dashboard"; // change if using Flask
            } else {
                error.innerText = "Invalid Username or Password!";
            }

            return false;
        }
    </script>
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:350px;">
    <h4 class="text-center mb-3">Login</h4>

    <form onsubmit="return validateLogin(event);">
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Enter Username">
        </div>

        <div class="mb-3">
            <input type="password" id="password" class="form-control" placeholder="Enter Password">
        </div>

        <div id="error" class="text-danger text-center mb-3"></div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="text-muted text-center mt-3" style="font-size:14px;">
        Username: <b>salesiancollege</b><br>
        Password: <b>salesian@2023</b>
    </div>
</div>

</body>
</html>
