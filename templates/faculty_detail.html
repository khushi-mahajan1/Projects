<!DOCTYPE html>
<html>
<head>
    <title>Faculty Detail</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .card {
            width: 420px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .profile-icon {
            font-size: 60px;
            color: #4CAF50;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .row {
            margin: 12px 0;
            font-size: 18px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .active {
            background-color: green;
        }

        .inactive {
            background-color: red;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<div class="card">
    
    <!-- ICON -->
    <div class="profile-icon">👨‍🏫</div>

    <!-- NAME -->
    <div class="name">{{ faculty.name }}</div>

    <div class="info">

        <div class="row">
            <span class="label">Faculty ID:</span> {{ faculty.id }}
        </div>

        <div class="row">
            <span class="label">Department:</span> {{ faculty.department }}
        </div>

        <div class="row">
            <span class="label">Status:</span>
            <span class="badge 
                {% if faculty.is_active %} active 
                {% else %} inactive 
                {% endif %}
            ">
                {% if faculty.is_active %}
                    Active
                {% else %}
                    Inactive
                {% endif %}
            </span>
        </div>

    </div>

    <!-- BACK BUTTON -->
    <a href="/auto_allocate" class="btn">⬅ Back</a>

</div>

</body>
</html>
