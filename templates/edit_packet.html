<!DOCTYPE html>
<html>
<head>
    <title>Edit Packet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">✏ Edit Packet</span>
    <a href="/packets" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 shadow-lg">
                <h4 class="text-center mb-4">Update Packet</h4>

                <form method="POST">
                    <div class="mb-3">
                        <label>Packet Name</label>
                        <input type="text" name="packet_name" 
                               value="{{ packet.packet_name }}" 
                               class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Script Count</label>
                        <input type="number" name="script_count" 
                               value="{{ packet.script_count }}" 
                               class="form-control" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/packets" class="btn btn-secondary">Cancel</a>
                        <button class="btn btn-success">Update</button>
                    </div>
                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
