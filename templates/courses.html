<!DOCTYPE html>
<html>
<head>
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- 🔵 BACK BUTTON (RIGHT SIDE) -->
    <div class="d-flex justify-content-end mb-3">
        <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
    </div>

    <!-- 📘 MAP COURSE TO FACULTY -->
    <div class="card p-3 mb-4">
        <h4>📘 Map Course to Faculty</h4>

        <label>Course</label>
        <select id="course_id" class="form-control">
            <option value="">Select Course</option>
            {% for c in all_courses %}
                <option value="{{ c.id }}">{{ c.course_name }}</option>
            {% endfor %}
        </select>

        <button onclick="fetchFaculty()" class="btn btn-primary mt-2">
            Fetch
        </button>

        <label class="mt-3">Paper Setter</label>
        <input type="text" id="paper_setter" class="form-control" readonly>
    </div>

    <!-- ➕ ADD COURSE -->
    <div class="card p-3 mb-4">
        <h4>Add Course</h4>

        <form method="POST" action="/add_course">
            <input type="text" name="course_name" placeholder="Course Name" class="form-control mb-2" required>

            <input type="text" name="course_code" placeholder="Course Code" class="form-control mb-2" required>

            <button type="submit" class="btn btn-success">
                Add Course
            </button>
        </form>
    </div>

    <!-- 📋 COURSE LIST -->
    <div class="card p-3">
        <h4>📋 Course List</h4>

        <table class="table table-bordered mt-3">
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Course Code</th>
                
                <th>Paper Setter</th>
                <th>Action</th>
            </tr>

            {% for row in courses %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.course_name }}</td>
                <td>{{ row.course_code }}</td>
                <td>
                    {{ row.paper_setter_name if row.paper_setter_name else 'Not Assigned' }}
                </td>

                <td>
                    <a href="/edit_course/{{ row.id }}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a href="/delete_course/{{ row.id }}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure you want to delete?');">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

<!-- ⚡ JAVASCRIPT -->
<script>
function fetchFaculty() {
    let courseId = document.getElementById("course_id").value;

    if (!courseId) {
        alert("Please select a course");
        return;
    }

    fetch(`/auto_assign/${courseId}`)
    .then(res => res.json())
    .then(data => {
        let field = document.getElementById("paper_setter");

        if (data.name) {
            field.value = data.name;
        } else {
            field.value = "Not Assigned";
        }

        location.reload(); // refresh table
    });
}
</script>

</body>
</html>
